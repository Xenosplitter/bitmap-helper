<html style="height:100%; background-color:#f2f2f2; font-family:monospace">

    <body onmousedown="onMouseDown(event)" onmouseup="onMouseUp(event)" onmousemove="onMouseMove(event)" onclick="onClick(event)" onmouseleave="onLeave(event)" style="min-height:100%" >
        <p>Edit the grid below to generate your color shortcodes.</p>
        <form id="gridConfig">
            <label for="gridWidth">Grid Width (Tiles) </label>
            <input type="number" id="gridWidth" name="width" value="32">
            <label for="gridHeight">Grid Height (Tiles) </label>
            <input type="number" id="gridHeight" name="height" value="8">
            <label for="tileSize">Tile Size </label>
            <input type="number" id="tileSize" name="size" value="32">
            <label for="tileGap">Tile Gap </label>
            <input type="number" id="tileGap" name="gap" value="0">
        </form>
        <button onclick="gridSetup()">Adjust Grid</button>
        <button onclick="copyToClipboard()">Copy to Clipboard</button>
    <body>

    <script src="./main.js"></script>
</html>
